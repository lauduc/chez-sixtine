<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendrier des Congés - GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📅 Calendrier des Congés</h1>
        
        <div class="github-info">
            <div class="status" id="status">🔄 Chargement...</div>
            <div class="file-path" id="githubPath"></div>
        </div>
        
        <div class="controls">
            <select id="mois">
                <option value="0">Janvier</option>
                <option value="1">Février</option>
                <option value="2">Mars</option>
                <option value="3">Avril</option>
                <option value="4">Mai</option>
                <option value="5">Juin</option>
                <option value="6">Juillet</option>
                <option value="7">Août</option>
                <option value="8">Septembre</option>
                <option value="9">Octobre</option>
                <option value="10">Novembre</option>
                <option value="11">Décembre</option>
            </select>
            <input type="number" id="annee" value="2024" min="2024" max="2030">
            <button onclick="changerMois()">Afficher</button>
            <button onclick="rafraichirDepuisGitHub()" class="btn-refresh">🔄 Rafraîchir</button>
        </div>

        <div class="ajout-conges">
            <h3>Ajouter des congés</h3>
            <select id="personne">
                <option value="Alice">Alice</option>
                <option value="Bob">Bob</option>
                <option value="Claire">Claire</option>
                <option value="David">David</option>
                <option value="Emma">Emma</option>
                <option value="Franck">Franck</option>
                <option value="Gaelle">Gaelle</option>
                <option value="Hugo">Hugo</option>
                <option value="Ines">Ines</option>
                <option value="Julien">Julien</option>
            </select>
            <input type="date" id="dateDebut">
            <input type="date" id="dateFin">
            <button onclick="ajouterConges()">Ajouter</button>
        </div>

        <div id="githubInstructions"></div>

        <div id="calendrier" class="calendrier"></div>
        
        <div class="legende">
            <span class="legende-item"><span class="conge-indic"></span> Congé</span>
        </div>
        
        <div class="github-actions">
            <button onclick="sauvegarderJSON()" class="btn-sauvegarder">💾 Exporter JSON</button>
            <a href="https://github.com/VOTRE_NOM_UTILISATEUR/NOM_DU_REPO/tree/main/data" 
               target="_blank" class="btn-github">📂 Voir sur GitHub</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
